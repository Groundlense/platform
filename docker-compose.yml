services:
  api:
    image: node:24-alpine
    container_name: groundlense-api
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install &&
             pnpm --filter api prisma:generate &&
             pnpm --filter api start:dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/groundlense?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - api_uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: groundlense-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: groundlense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d groundlense"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: groundlense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pnpm_store:
  api_node_modules:
  api_app_node_modules:
  api_uploads:
