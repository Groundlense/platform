services:
  api:
    image: node:24-alpine
    container_name: groundlense-api
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install &&
             pnpm --filter api prisma:generate &&
             pnpm --filter api exec prisma migrate deploy &&
             pnpm --filter api exec prisma db seed &&
             pnpm --filter api start:dev"
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/groundlense?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - api_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - api_uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: node:24-alpine
    container_name: groundlense-web
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install &&
             pnpm --filter web dev"
    environment:
      NODE_ENV: development
      API_URL: http://api:8000/api/v1
      NEXT_PUBLIC_APP_NAME: GroundLense
    ports:
      - "3000:3001"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next
    depends_on:
      - api
    restart: unless-stopped

  prisma-studio:
    image: node:24-alpine
    container_name: groundlense-prisma-studio
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install &&
             pnpm --filter api prisma:generate &&
             pnpm --filter api exec prisma studio --port 5555 --hostname 0.0.0.0 --browser none"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/groundlense?schema=public
    ports:
      - "5555:5555"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - studio_node_modules:/app/node_modules
      - studio_app_node_modules:/app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: groundlense-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: groundlense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d groundlense"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: groundlense-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pnpm_store:
  api_node_modules:
  api_app_node_modules:
  api_uploads:
  web_node_modules:
  web_app_node_modules:
  web_next:
  studio_node_modules:
  studio_app_node_modules:
